services:
  app:
    build:
      context: .
      target: production
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-laravel}_app_prod
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - laravel
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", 'php artisan tinker --execute=''echo "OK";''']
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-laravel}_nginx_prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - laravel
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  postgres:
    image: postgres:15.13-alpine3.21
    container_name: ${COMPOSE_PROJECT_NAME:-laravel}_db_prod
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - laravel
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

