services:
  app:
    build:
      context: .
      target: production
      dockerfile: Dockerfile

    image: ${COMPOSE_PROJECT_NAME:-laravel}_app:${IMAGE_TAG:-latest}
    container_name: ${COMPOSE_PROJECT_NAME:-laravel}_app_prod

    volumes:
      - ./storage:/var/www/storage
      - ./public:/var/www/public

    environment:
      APP_NAME: ${APP_NAME:-Laravel}
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      APP_DEBUG: false
      APP_URL: ${APP_URL}

      # Database
      DB_CONNECTION: ${DB_CONNECTION:-pgsql}
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}

      # Cache & Session
      CACHE_DRIVER: ${CACHE_DRIVER:-file}
      SESSION_DRIVER: ${SESSION_DRIVER:-file}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-sync}

      # Security
      TRUSTED_PROXIES: ${TRUSTED_PROXIES:-*}
      TRUSTED_HOSTS: ${TRUSTED_HOSTS:-*}

    extra_hosts:
      - 'host.docker.internal:host-gateway'

    networks:
      - network

    restart: unless-stopped
    ports:
      - '127.0.0.1:${APP_PORT:-9003}:9000'

    healthcheck:
      test: ['CMD-SHELL', 'php-fpm-healthcheck || php -v || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 512M

    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
        compress: 'true'

networks:
  network:
    name: ${COMPOSE_PROJECT_NAME:-laravel}_network
    driver: bridge
