services:
  app:
    build:
      context: .
      target: development
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-laravel}_app_dev
    volumes:
      - .:/var/www:cached
      - vendor:/var/www/vendor
      # - node_modules:/var/www/node_modules
    depends_on:
      - postgres
    networks:
      - laravel
    restart: unless-stopped

  nginx:
    image: nginx:1.27.5-alpine3.21
    container_name: ${COMPOSE_PROJECT_NAME:-laravel}_nginx_dev
    ports:
      - "${NGINX_PORT:-8000}:80"
    volumes:
      - .:/var/www:cached
      - ./docker/nginx/dev.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - laravel
    restart: unless-stopped

  postgres:
    image: postgres:15.13-alpine3.21
    container_name: ${COMPOSE_PROJECT_NAME:-laravel}_db_dev
    environment:
      POSTGRES_DB: ${DB_DATABASE:-laravel}
      POSTGRES_USER: ${DB_USERNAME:-laravel}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT_PGSQL:-5432}:5432"
    networks:
      - laravel
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-laravel}"]
      interval: 30s
      timeout: 10s
      retries: 3

  pgadmin:
    image: dpage/pgadmin4:9.5.0
    container_name: ${COMPOSE_PROJECT_NAME:-laravel}_pgadmin
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: khalilannbiya@gmail.com
      PGADMIN_DEFAULT_PASSWORD: Together1!
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - laravel
    restart: unless-stopped
  # node:
  #   image: node:22.16.0-alpine3.22
  #   container_name: ${COMPOSE_PROJECT_NAME:-laravel}_node_dev
  #   working_dir: /var/www
  #   volumes:
  #     - .:/var/www:cached
  #     - node_modules:/var/www/node_modules
  #   command: sh -c "npm install && npm run dev"
  #   networks:
  #     - laravel
  #   restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local
  vendor:
    driver: local
  # node_modules:
  #   driver: local

networks:
  laravel:
    driver: bridge
