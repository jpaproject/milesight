version: "3.7"

services:
    app:
        restart: always
        build:
            context: ./
            dockerfile: Dockerfile
        container_name: grootech-ap2-temp-app
        working_dir: /var/www/html
        volumes:
            - ./:/var/www/html
        networks:
            - grootech-ap2-temp
    nginx:
        restart: always
        image: nginx:1.19-alpine
        container_name: grootech-ap2-temp-nginx
        ports:
            - 1090:80
        volumes:
            - ./:/var/www/html
            - ./nginx/conf.d:/etc/nginx/conf.d/
            - ./nginx/logs:/var/log/nginx
        networks:
            - grootech-ap2-temp

